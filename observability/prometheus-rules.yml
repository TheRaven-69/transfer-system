groups:
  - name: transfer-system-alerts
    rules:
      - alert: HighApiErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[1m]))
            /
            clamp_min(sum(rate(http_requests_total[1m])), 0.001)
          ) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API error rate is above 5%"
          description: "More than 5% of API requests returned 5xx responses for one minute."

      - alert: RabbitMqQueueBacklog
        expr: sum(rabbitmq_queue_messages_ready) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue backlog is growing"
          description: "More than 100 messages have been ready for processing for two minutes."

      - alert: HighApiP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency is high"
          description: "API p95 latency has exceeded one second for five minutes."

      - alert: DatabaseQueryErrors
        expr: sum(rate(db_query_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Database query errors detected"
          description: "The application has observed database query errors."

      - alert: SystemMetricsCollectionFailure
        expr: increase(system_metrics_collection_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "System metrics collection is failing"
          description: "The application could not query system totals for monitoring."
