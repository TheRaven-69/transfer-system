apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: transfer-app-hpa
  namespace: transfer-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transfer-app

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
