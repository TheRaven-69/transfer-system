apiVersion: apps/v1
kind: Deployment
metadata:
  name: transfer-worker
  namespace: transfer-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transfer-worker
  template:
    metadata:
      labels:
        app: transfer-worker
    spec:
      containers:
        - name: transfer-worker
          image: transfer-system:latest
          imagePullPolicy: Never
          command:
            - celery
          args:
            - -A
            - app.core.celery_app.celery_app
            - worker
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: transfer-system-config
            - secretRef:
                name: transfer-system-secrets
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - celery -A app.core.celery_app.celery_app inspect ping -d celery@$HOSTNAME | grep -q OK
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - celery -A app.core.celery_app.celery_app inspect ping -d celery@$HOSTNAME | grep -q OK
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1024Mi"
