apiVersion: keda.sh/v1beta1
kind: TriggerAuthentication
metadata:
  name: rabbitmq-trigger-auth
  namespace: transfer-system
spec:
  secretTargetRef:
    - parameter: host
      name: transfer-system-secrets
      key: RABBITMQ_URL
---
apiVersion: keda.sh/v1beta1
kind: ScaledObject
metadata:
  name: transfer-worker-scaledobject
  namespace: transfer-system
spec:
  scaleTargetRef:
    name: transfer-worker

  minReplicaCount: 1
  maxReplicaCount: 5

  pollingInterval: 10
  cooldownPeriod: 60

  triggers:
    - type: rabbitmq
      metadata:
        protocol: amqp
        queueName: celery
        mode: QueueLength
        value: "5"
      authenticationRef:
        name: rabbitmq-trigger-auth
