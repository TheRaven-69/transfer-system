apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: transfer-worker-scaledobject
spec:
  scaleTargetRef:
    name: transfer-worker

  minReplicaCount: 1
  maxReplicaCount: 5

  pollingInterval: 10
  cooldownPeriod: 60

  triggers:
    - type: rabbitmq
      metadata:
        protocol: amqp
        queueName: celery
        mode: QueueLength
        value: "5"
        host: amqp://guest:guest@rabbitmq.default.svc.cluster.local:5672//