apiVersion: apps/v1
kind: Deployment
metadata:
  name: transfer-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transfer-app
  template:
    metadata:
      labels:
        app: transfer-app
    spec:
      containers:
        - name: transfer-app
          image: transfer-system:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: transfer-system-config
            - secretRef:
                name: transfer-system-secrets
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: transfer-app
spec:
  selector:
    app: transfer-app
  ports:
    - name: http
      port: 8000
      targetPort: 8000
