repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.9.7
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy app
        language: system
        pass_filenames: false

      - id: bandit
        name: bandit
        entry: bandit -r app
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
