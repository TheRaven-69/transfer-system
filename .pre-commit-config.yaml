repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format-check
        name: Ruff format check
        entry: ruff format --check .
        language: system
        pass_filenames: false

      - id: mypy
        name: MyPy
        entry: mypy app
        language: system
        pass_filenames: false

      - id: pytest
        name: Pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false

      - id: bandit
        name: Bandit
        entry: bandit -r app
        language: system
        pass_filenames: false

      - id: docker-build
        name: Docker build
        entry: docker build -t transfer-system:ci .
        language: system
        pass_filenames: false
